server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip — critical for the ~105MB data/ directory of JSON files
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # CORS — mirrors http-server --cors behavior used in dev
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept' always;

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # HTML pages: no cache (each page references versioned assets)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header 'Access-Control-Allow-Origin' '*' always;
        try_files $uri =404;
    }

    # Immutable assets: CSS, JS, fonts — long cache
    location ~* \.(css|js|woff|woff2|ttf|otf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header 'Access-Control-Allow-Origin' '*' always;
        try_files $uri =404;
    }

    # JSON data files: short cache (change with app versions)
    location /data/ {
        add_header Cache-Control "public, max-age=3600" always;
        add_header 'Access-Control-Allow-Origin' '*' always;
        try_files $uri =404;
    }

    # Service worker: never cache
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header 'Access-Control-Allow-Origin' '*' always;
        try_files $uri =404;
    }

    # Default: serve file exactly or 404
    # Not a single-page app — each HTML file is a standalone page
    location / {
        try_files $uri $uri/ =404;
    }
}
